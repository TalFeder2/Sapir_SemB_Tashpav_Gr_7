<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>מערכת שעות | סמסטר קיץ תשפ"ו | מחזור 7</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Heebo',sans-serif;background:#2b3a59;color:#f1f5f9;text-align:center;direction:rtl}
    header{padding:20px}
    .logo{max-width:200px;margin:20px auto 10px;display:block}
    .subheader{font-size:16px;color:#94a3b8;margin-bottom:8px;font-weight:500}
    h1{margin:10px 0 4px;font-size:26px;font-weight:800}
    .sem-label{font-size:18px;color:#fde68a;font-weight:800;margin-bottom:18px}

    .next{max-width:860px;margin:0 auto 8px; padding:14px 18px; border-radius:14px;
      background:#3a4a6a; box-shadow:0 8px 18px rgba(0,0,0,.18); text-align:center}
    .next-title{font-size:20px; font-weight:800; margin:0 0 6px}
    .next-date{color:#fde68a; font-weight:800}
    .next-type{margin:0; color:#e2e8f0; font-weight:600}

    .controls { display: flex; justify-content: center; gap: 12px; margin: 15px auto 25px; flex-wrap: wrap; }
    .control-btn { background: #1e293b; color: #f8fafc; border: 2px solid #38bdf8; padding: 10px 20px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s ease; font-family: 'Heebo', sans-serif; }
    .control-btn:hover { background: #38bdf8; color: #0f172a; transform: translateY(-2px); }
    .control-btn.current { background: #38bdf8; color: #0f172a; font-weight: 800; }

    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:800px;margin:0 auto;padding:0 20px 20px}
    @media(max-width:700px){.grid{grid-template-columns:1fr}}

    .card{background:#3a4a6a;border-radius:18px;padding:18px;box-shadow:0 8px 18px rgba(0,0,0,.25); text-align: center;}
    .lecturer{font-weight:700;font-size:18px;margin-bottom:4px}
    .course{color:#dbeafe;font-weight:600;margin:0 0 8px}
    .combined-tag{color:#fde68a;font-weight:800;font-size:13px;letter-spacing:.5px;margin-bottom:8px}
    .combined-item{margin:0 0 6px}
    .combined-item .ci-course{font-weight:700;color:#f1f5f9}
    .combined-item .ci-lecturer{color:#dbeafe;font-size:14px}

    .time, .break {
      font-weight:600;
      color:#38bdf8;
      margin-bottom:6px;
      display: inline-block;
      direction: ltr;
      unicode-bidi: isolate;
    }
    .break { color:#cbd5e1; font-size:14px; margin:2px 0; }
    .tbd { color:#94a3b8; font-size:14px; font-weight:600; margin:6px 0; }
    .zoom-tbd { color:#94a3b8; font-size:14px; font-weight:600; margin-top:8px; font-style:italic; }
    .event-card h2{color:#fde68a;margin:0 0 6px;font-size:24px}
    .event-card p{color:#e2e8f0;font-weight:600;margin:0}
    .event-highlight{grid-column:1/-1;background:linear-gradient(135deg,#7c3aed 0%,#2563eb 55%,#38bdf8 100%);color:#fff;border-radius:18px;padding:22px;box-shadow:0 12px 26px rgba(124,58,237,.4)}
    .event-highlight .ev-series{font-size:13px;font-weight:800;letter-spacing:.5px;opacity:.92;margin-bottom:6px}
    .event-highlight .ev-title{font-size:23px;font-weight:800;margin:0 0 4px}
    .event-highlight .ev-tagline{font-size:14px;font-weight:700;color:#fde68a;margin:0 0 10px}
    .event-highlight .ev-time{font-weight:800;font-size:18px;color:#fde68a;direction:ltr;unicode-bidi:isolate;margin-bottom:10px}
    .event-highlight .ev-detail{margin:3px 0;font-weight:600;line-height:1.5}
    .event-highlight .ev-loc{margin-top:10px;font-weight:800}
    .event-highlight .ev-note{margin-top:6px;font-size:14px;opacity:.92}
    .event-highlight .ev-register{margin-top:14px;width:auto;padding:11px 22px}

    .room-info{color:#fde68a;font-weight:600;font-size:15px;margin:4px 0}
    .btn{display:inline-block;width:90%;padding:10px 12px;border-radius:10px;text-decoration:none;color:#00131a;font-weight:800;background:linear-gradient(90deg,#38bdf8,#22d3ee);transition:transform .1s ease;margin-top:8px; text-align: center;}
    .btn:hover{transform:translateY(-2px)}

    footer{color:#94a3b8;font-size:13px;margin:30px 0 80px}
    .floating-btn{position:fixed;left:20px;bottom:20px;background:linear-gradient(180deg,#facc15,#f59e0b);color:#1e293b;font-weight:800;border:none;border-radius:12px;padding:14px 18px;width:160px;cursor:pointer;text-decoration:none;box-shadow:0 6px 14px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;}
  </style>
</head>
<body>
  <header>
    <img src="Sapir_new_logo.svg.png" alt="לוגו ספיר" class="logo" />
    <div class="subheader">תואר שני בלימודי תרבות - מנהיגות ויזמות בתרבות</div>
    <h1>מערכת שעות | מחזור 7</h1>
    <div class="sem-label">סמסטר קיץ תשפ"ו</div>
  </header>

  <section class="next">
    <p class="next-title">המפגש המוצג: יום רביעי <span id="next-date" class="next-date"></span></p>
    <p id="meeting-type" class="next-type">—</p>
  </section>

  <div class="controls">
    <button id="btn-prev" class="control-btn">השבוע הקודם</button>
    <button id="btn-current" class="control-btn current">המפגש הקרוב</button>
    <button id="btn-next" class="control-btn">השבוע הבא</button>
  </div>

  <section id="schedule" class="grid"></section>

  <a class="floating-btn" href="https://docs.google.com/document/d/1ggiwuqmxQImb9vuWOHQXh9k6IZLkbGdh/edit?usp=sharing" target="_blank">📄 לוח זמנים מלא</a>

  <footer>© 2026 מערכת שעות | עדכון אחרון: 28/6/26</footer>

  <script>
    const heMonths = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
    const YEAR = 2026;

    // מבנה הסמסטר – סמסטר קיץ תשפ"ו (כל המפגשים בימי רביעי)
    const schedule = [
      { day: 22, month: "יולי",   type: "לימודים מקוונים",  note: "שבוע 1 · ערב תשעה באב" },
      { day: 29, month: "יולי",   type: "יום לימודים פיזי", note: "שבוע 2", physicalVariant: "workshop",
        events: [
          {
            series: "מבט · סדרת מפגשים בין תרבות, קהילה ואקדמיה",
            title: "מפגש: כתיבה, השראה ושיח ספרות",
            tagline: "פלאי המבט המשתהה",
            time: "16:30",
            details: [
              "פרופ' עומרי הרצוג בשיחה עם פרופ' נורית גרץ-קינן",
              "סדנאות כתיבה בהנחיית: גלית דהן-קרליבך · אפרת רפל-פראוי"
            ],
            location: "מתחם ה‑X-LAB · המכללה האקדמית ספיר",
            note: "המפגש ללא עלות · בהרשמה מראש",
            register: "https://forms.gle/NAJTbMzQwesA1z1n7"
          }
        ] },
      { day: 5,  month: "אוגוסט", type: "לימודים מקוונים",  note: "שבוע 3" },
      { day: 12, month: "אוגוסט", type: "יום לימודים פיזי", note: "שבוע 4", physicalVariant: "workshop" },
      { day: 19, month: "אוגוסט", type: "לימודים מקוונים",  note: "שבוע 5" },
      { day: 26, month: "אוגוסט", type: "לימודים מקוונים",  note: "שבוע 6" },
      { day: 2,  month: "ספטמבר", type: "יום לימודים פיזי", note: "שבוע 7", physicalVariant: "swapChaimDavid" },
      { day: 9,  month: "ספטמבר", type: "לימודים מקוונים",  note: "שבוע 8 · לפני חופשת ראש השנה (ו' 11.9 – ב' 14.9)" },
      { day: 16, month: "ספטמבר", type: "לימודים מקוונים",  note: "שבוע 9 · יום לימודים רגיל — בין ראש השנה ליום כיפור" },
      { day: 23, month: "ספטמבר", type: "אירוע מיפויים", note: "שבוע 10", special: "אירוע מיפויים", specialSub: "אירוע מיפויים יתקיים לאורך כל היום — אין שיעורים רגילים." },
    ];

    // מבנה יום לימודים מקוון (התחלה 9:30)
    const onlineCourses = [
      { lecturer: 'ד"ר חיים ביטון', course: "מכור היתוך לסכסוך: היסטוריה, פוסט ציונות והשיח המזרחי בישראל", time: "11:45–9:30",  break: "12:15–11:45", zoom: "https://sapir.zoom.us/j/89359822467" },
      { lecturer: "מר דוד פרץ",      course: "השתלבות והיסטורית הזמר של יוצאי ארצות האסלאם בישראל",      time: "14:30–12:15", break: "15:00–14:30", zoom: "" },
      { group: [
          { lecturer: "גב' מיכל דיין",   course: "לספר היסטוריות" },
          { lecturer: "גב' שירה לפידות", course: "תרבות דרומית" }
        ], time: "17:00–15:00", break: "", zoom: "https://sapir.zoom.us/my/michaldayan" },
    ];

    // מבנה יום לימודים פיזי במכללה (התחלה 10:00)
    const physicalCourses = [
      { lecturer: 'ד"ר חיים ביטון', course: "מכור היתוך לסכסוך: היסטוריה, פוסט ציונות והשיח המזרחי בישראל", time: "12:00–10:00", break: "12:30–12:00" },
      { group: [
          { lecturer: "גב' מיכל דיין",   course: "לספר היסטוריות" },
          { lecturer: "גב' שירה לפידות", course: "תרבות דרומית" }
        ], time: "14:00–12:30", break: "14:30–14:00" },
      { lecturer: "מר דוד פרץ",      course: "השתלבות והיסטורית הזמר של יוצאי ארצות האסלאם בישראל",      time: "16:30–14:30", break: "" },
    ];

    const ROOM = "כיתה 14102";
    const WORKSHOP = { course: "סדנת תרבות וחוסן", time: "14:00–12:30", break: "14:30–14:00" };

    function getNextWednesday(fromDate){
      const d = new Date(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());
      const diff = (3 - d.getDay() + 7) % 7;
      d.setDate(d.getDate() + (diff === 0 && fromDate.getDay() === 3 ? 0 : diff));
      return d;
    }

    // ברירת מחדל: המפגש הקרוב ביותר מהיום והלאה (אחרת – המפגש הראשון)
    function findInitialView(){
      const today = new Date();
      today.setHours(0,0,0,0);
      for (const e of schedule){
        const m = heMonths.indexOf(e.month);
        const d = new Date(YEAR, m, e.day);
        if (d >= today) return d;
      }
      const first = schedule[0];
      return new Date(YEAR, heMonths.indexOf(first.month), first.day);
    }

    let currentDateToView = findInitialView();

    function renderSchedule(dateToView) {
      const nextWed = getNextWednesday(dateToView);
      const day = nextWed.getDate();
      const monthName = heMonths[nextWed.getMonth()];
      document.getElementById('next-date').textContent = `${day} ב${monthName}`;

      const match = schedule.find(e => e.day === day && e.month === monthName);
      document.getElementById('meeting-type').textContent =
        match ? (match.type + (match.note ? ` · ${match.note}` : "")) : "אין מידע זמין";

      const container = document.getElementById("schedule");
      container.innerHTML = "";

      if (!match) {
        container.innerHTML = `<p style="grid-column: 1 / -1;">אין שיעורים מתוכננים בשבוע זה.</p>`;
        return;
      }

      // ימים מיוחדים ללא שיעורים רגילים (למשל אירוע מיפויים)
      if (match.special) {
        container.innerHTML = `
          <article class="card event-card" style="grid-column: 1 / -1;">
            <h2>${match.special}</h2>
            ${match.specialSub ? `<p>${match.specialSub}</p>` : ""}
          </article>`;
        return;
      }

      const isPhysical = match.type.includes("פיזי");
      let list = isPhysical ? physicalCourses : onlineCourses;
      if (isPhysical && match.physicalVariant === "workshop") {
        list = physicalCourses.map(c => c.group ? WORKSHOP : c);
      }
      if (isPhysical && match.physicalVariant === "swapChaimDavid") {
        const chaim = physicalCourses.find(c => c.lecturer && c.lecturer.includes("ביטון"));
        const david = physicalCourses.find(c => c.lecturer && c.lecturer.includes("פרץ"));
        list = physicalCourses.map(c => {
          if (c === chaim) return { ...david, time: chaim.time, break: chaim.break };
          if (c === david) return { ...chaim, time: david.time, break: david.break };
          return c;
        });
      }

      list.forEach(cls => {
        const card = document.createElement("article");
        card.className = "card";

        let head;
        if (cls.group) {
          head = `
            <div class="combined-tag">שיעור משולב</div>
            ${cls.group.map(g => `
              <div class="combined-item">
                <div class="ci-course">${g.course}</div>
                <div class="ci-lecturer">${g.lecturer}</div>
              </div>`).join("")}
          `;
        } else {
          head = `
            ${cls.lecturer ? `<div class="lecturer">${cls.lecturer}</div>` : `<div class="combined-tag">סדנה</div>`}
            <div class="course">${cls.course}</div>
          `;
        }

        card.innerHTML = `
          ${head}
          ${cls.time ? `<div class="time">זמן שיעור: ${cls.time}</div>` : `<div class="tbd">שעות יתפרסמו בהמשך</div>`}
          ${isPhysical ? `<div class="room-info">מיקום: ${ROOM}</div>` : ""}
          ${cls.break ? `<div><span class="break">${cls.break} :הפסקה</span></div>` : ""}
          ${!isPhysical ? (cls.zoom ? `<a class="btn" href="${cls.zoom}" target="_blank">⤴︎ כניסה לזום</a>` : `<div class="zoom-tbd">קישור זום יתפרסם בהמשך</div>`) : ""}
        `;
        container.appendChild(card);
      });

      if (match.events) {
        match.events.forEach(ev => {
          const card = document.createElement("article");
          card.className = "card event-highlight";
          card.innerHTML = `
            <div class="ev-series">${ev.series}</div>
            <div class="ev-title">${ev.title}</div>
            ${ev.tagline ? `<div class="ev-tagline">— ${ev.tagline} —</div>` : ""}
            <div class="ev-time">🕓 ${ev.time}</div>
            ${(ev.details || []).map(d => `<div class="ev-detail">${d}</div>`).join("")}
            ${ev.location ? `<div class="ev-loc">📍 ${ev.location}</div>` : ""}
            ${ev.note ? `<div class="ev-note">${ev.note}</div>` : ""}
            ${ev.register ? `<a class="btn ev-register" href="${ev.register}" target="_blank">📝 להרשמה לחצו כאן</a>` : ""}
          `;
          container.appendChild(card);
        });
      }
    }

    renderSchedule(currentDateToView);
    document.getElementById('btn-prev').addEventListener('click', () => { currentDateToView.setDate(currentDateToView.getDate() - 7); renderSchedule(currentDateToView); });
    document.getElementById('btn-next').addEventListener('click', () => { currentDateToView.setDate(currentDateToView.getDate() + 7); renderSchedule(currentDateToView); });
    document.getElementById('btn-current').addEventListener('click', () => { currentDateToView = findInitialView(); renderSchedule(currentDateToView); });
  </script>
</body>
</html>
